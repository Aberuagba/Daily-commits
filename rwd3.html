<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: blueviolet;
            padding: 0 10px;
        }

        .box{
            border:1px solid black;
            width: 100%;
            height: 400px;
            border-radius:10px ;
            margin-bottom: 10px;
        }

             @media(min-width: 520px) {
            .gridcontainer{
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-gap: 30px;
            }
        }
         @media(min-width: 760px) {
            .gridcontainer{
                grid-template-columns: repeat(3, 1fr);
            }
        }
       
            @media(min-width: 1200px) {
            .gridcontainer{
                grid-template-columns: repeat(4, 1fr);
            }
        }         

    </style>
</head>
<body>
    
    <div class="grid-container">

        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        

</body>
</html>
