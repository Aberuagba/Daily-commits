<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Snippets</title>

    <style>
         
         .container{
            border:1px solid #c2c2c2;
            width:90%;
            height: 500px;
            margin:50px auto;
         }

            .box{
                border:1px solid #c2c2c2;
                width: 30%;
                height: 300px;
                float: left;
                margin-top: 100px;
                margin-left: 3%;
            }

            .avatar{
                border: 1px solid red;
                width: 100px;
                height: 100px;
                border-radius: 100px;
                background-color: red;
                margin:-50px auto 0 auto;
            }

            p{
                font-family: Helvetica;
                width:60%;
                margin:50px auto;
                line-height: 1.5;
                text-align: center;
            }

            span{
                font-weight: bolder;
            }
         </style>

</head>
<body>
    
    <div class="container">

        <div class="box">
              <div class="avatar"></div>
              <p><span>795+ billion</span> interaction across channels with <span>99.999%</span> API uptime</p>

        </div>

        <div class="box">
                <div class="avatar"></div>
                <p><span>3+ billion</span> phone numbers in <span>100+</span> countries</p>
        </div>

                <div class="box">
                   <div class="avatar"></div>
                <p><span>172,000</span> businesses trust Twillio for communication with enterprise-grade 
                    security and trust ISO 27001, SOC2
                </p>

    </div>
</body>
</html>
