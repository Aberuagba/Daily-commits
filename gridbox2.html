<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid</title>

    <style type="text/css">

          *{
             margin: 0;
             padding: 0;
             box-sizing: border-box;
          }

          .grid-container{
             width: 85%;
             border: 1px solid purple;
             margin: auto;
             padding: 4%;
             display: grid;
             grid-template-columns: (3, 1fr);
             grid-gap: 30px;
          }

          .box{
             border:1px solid purple;
             height: 200px;
             width: 250px;
          }
    </style>
</head>
<body>
    
    <div class="grid-container">

        <div class="box">Box One</div>
        <div class="box">Box Two</div>
        <div class="box">Box Three</div>
        <div class="box">Box Four</div>
        <div class="box">Box Five</div>
        <div class="box">Box Six</div>
        <div class="box">Box Seven</div>
        <div class="box">Box Eight</div>
        <div class="box">Box Nine</div>
        <div class="box">Box Ten</div>
        <div class="box">Box Eleven</div>
        <div class="box">Box Twelve</div>


    </div>
</body>
</html>
