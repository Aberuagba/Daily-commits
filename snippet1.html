<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Snippet</title>
    <style>

        .container {
            border: 1px solid black;
            width: 90%;
            height: 500px;
            margin: 50px auto;
            background-color: black;
        }

        h4, p{
            color: #fff;
            font-family: Helvetica;
        }
        h4{
            font-size: 32px;
            letter-spacing: 2px;
        }

        p{
            font-size: 20px;
        }
        .avatar {
            border: 2px solid #fff;
            width: 100px;
            height: 300px;
            border-radius: 100px;
            background-image: url("pic1.jpeg");
            background-size: cover;
            background-position: center;
            margin-left: 200px;
        }

    .content{
        width: 600px;
        margin-left: 50px;
    }

    .avatar, .content{
        float: left;
        margin-top: 100px;
    }

    </style>
</head>
<body>
    


    <div class="container">
       <div class="avatar"></div>
       <div class="content">
            <h4>Figma is fast. Files are always up to date. It's easy to share 
                designs across the organization; so collaboration is easy.</h4>
        <h4>
        <p>Bryan Haggerty, Sr. Design Manager at Twitter</p>
        </div>
    
        </div>
</body>
</html>
