<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox</title>

    <style type="text/css">

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

       ul{
         list-style-type: none;
       }
       a{
         text-decoration: none;
       }
       body{
           font-family: "Helvetica";
       }
       
       .main-nav{
           width: 100%;
           height: 120px;
           background: linear-gradient(#3E0638, #8F3A8C);
           padding: 0 5%;
           display: flex;
           justify-content: space-between;
           align-items: center;
       }

       .main-menu{
           display: flex;
       }

       .main-menu li{
           padding: 0 20px;
       }

       .main-menu li a{
        color: #fff;
        font-size: 18px;
        padding-bottom: 5px;
       }

       .main-menu li a:hover{
          border-bottom:3px solid #fff;
       }
       
    </style>
</head>
<body>

    
    <div class="main-nav">
        <img src="google.webp">
        <p>+234-916-226-7136</p>
        <ul class="main-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Catalogue</a></li>
            <li><a href="#">Registration</a></li>
            <li><a href="#">Testimonials</a></li>
            <li><a href="#">Contact Us</a></li>


        </ul>
    </div>
</body>
</html>
